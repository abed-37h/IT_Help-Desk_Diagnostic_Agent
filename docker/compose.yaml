services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: it-helpdesk-agent
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - db-data:/app/app/data/db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 3
    
volumes:
  db-data:
    driver: local